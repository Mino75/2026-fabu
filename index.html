<!DOCTYPE html>
<html lang="__HTML_LANG__">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>__SITE_TITLE__</title>
  <meta
    name="description"
    content="__SITE_DESCRIPTION__"
  />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
</head>
<body>
  <div id="app"></div>

  <template id="tpl-home">
    <main class="page-shell">
      <header class="hero">
        <div id="heroBadge" class="hero-badge"></div>
        <h1 id="heroTitle" class="hero-title"></h1>
        <p id="heroText" class="hero-text"></p>
      </header>

      <section class="toolbar surface">
        <div class="field field-search">
          <label id="searchLabel" for="searchInput"></label>
          <input
            id="searchInput"
            type="search"
            autocomplete="off"
          />
        </div>

        <div class="field">
          <label id="tagLabel" for="tagSelect"></label>
          <select id="tagSelect">
            <option id="tagOptionAll" value=""></option>
          </select>
        </div>

        <div class="field">
          <label id="sortLabel" for="sortSelect"></label>
          <select id="sortSelect">
            <option id="sortNewest" value="desc"></option>
            <option id="sortOldest" value="asc"></option>
          </select>
        </div>
      </section>

      <section class="results-row">
        <span id="resultsCount">0</span>
        <span id="showingCount" class="showing-count"></span>
      </section>

      <section id="articleList" class="cards-grid"></section>

      <section class="load-more-row">
        <button id="loadMoreButton" type="button" class="button-link button-secondary" hidden></button>
      </section>
    </main>
  </template>

  <template id="tpl-card">
    <article class="surface card">
      <div class="card-meta">
        <time class="card-date"></time>
        <div class="tag-list"></div>
      </div>

      <h2 class="card-title"></h2>
      <p class="card-excerpt"></p>

      <div class="card-footer">
        <a class="button-link card-link" href="#"></a>
      </div>
    </article>
  </template>

  <template id="tpl-article">
    <main class="page-shell article-shell">
      <nav class="top-nav">
        <a id="backToArticles" href="/" data-link class="back-link"></a>
      </nav>

      <header class="surface article-header">
        <time id="articleDate" class="article-date"></time>
        <h1 id="articleTitle" class="article-title"></h1>
        <p id="articleExcerpt" class="article-excerpt"></p>
        <div id="articleTags" class="tag-list"></div>
      </header>

      <article id="articleBody" class="surface article-body">
        <p>Loading...</p>
      </article>
    </main>
  </template>

  <template id="tpl-not-found">
    <main class="page-shell narrow-shell">
      <section class="surface empty-state">
        <h1 id="notFoundTitle"></h1>
        <p id="notFoundText"></p>
        <a id="notFoundBackHome" href="/" data-link class="button-link"></a>
      </section>
    </main>
  </template>

  <script src="/app-config.js"></script>
  <script type="module" src="/styles.js"></script>
  <script type="module" src="/main.js"></script>
</body>
</html>
